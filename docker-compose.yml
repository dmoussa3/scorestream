version: '3.8'

services:

  # ── Kafka dependencies ──────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: scorestream-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: scorestream-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_MS: 86400000        # keep messages for 24 hours
      KAFKA_LOG_RETENTION_BYTES: -1           # no size limit
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-init:
    image: confluentinc/cp-kafka:7.4.0
    container_name: scorestream-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Creating Kafka topics...'
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic epl.live.scores --partitions 1 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic epl.standings --partitions 1 --replication-factor 1
      echo 'Topics created.'
      "
    restart: "no"

  # ── Kafka UI (view topics/messages in browser) ──────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: scorestream-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: scorestream
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: scorestream-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: scorestream
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: pg_isready -U admin -d scorestream
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: scorestream-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Producer (polls ESPN API → Kafka) ───────────────────────────
  producer:
    build: ./producer
    container_name: scorestream-producer
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      POLL_INTERVAL_SECONDS: 15
      PLAYER_DATA_API_KEY: 17eb7ad52249415a860412e6436ccff9
      DATABASE_URL: postgresql://admin:password@postgres:5432/scorestream
    restart: unless-stopped

  # ── Spark Streaming (processes data [games/goals] from Kafka) ──────────────────
  spark-streaming:
    build: ./spark
    container_name: scorestream-spark
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DATABASE_URL: postgresql://admin:password@postgres:5432/scorestream
    volumes:
      - ./checkpoints:/app/checkpoints
    restart: unless-stopped

  # ── FastAPI ─────────────────────────────────────────────────────
  api:
    build: ./api
    container_name: scorestream-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_NAME: scorestream
      DB_USER: admin
      DB_PASSWORD: password
      REDIS_HOST: redis
    restart: unless-stopped

  # ── Airflow (for scheduling/monitoring Spark jobs) ─────
  airflow-init:
    image: apache/airflow:2.8.0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:password@postgres:5432/scorestream
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__WEBSERVER__SECRET_KEY: 'scorestream'
    command: db init
    restart: "no"

  airflow-webserver:
    image: apache/airflow:2.8.0
    container_name: scorestream-airflow
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8081:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:password@postgres:5432/scorestream
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__WEBSERVER__SECRET_KEY: 'scorestream'
      AIRFLOW__CORE__DAGS_ARE_PAUSE_ON_LOAD: "false"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./archive:/opt/airflow/archive
    command: standalone
    restart: unless-stopped

  frontend:
      build: ./frontend
      container_name: scorestream-frontend
      ports:
        - "3000:3000"
      depends_on:
        - api
      environment:
        REACT_APP_API_URL: http://localhost:8000
      stdin_open: true
      volumes:
        - ./frontend/src:/app/src
        - ./frontend/public:/app/public

volumes:
  postgres_data: